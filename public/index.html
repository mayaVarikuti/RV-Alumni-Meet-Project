<!DOCTYPE html>
<html>
<head>
    <title>RV Alumni Meet Registration</title>
    <meta name="author" content="Maya Varikuti">
    <link rel="stylesheet" href="css/styles.css">
    <script type="module" src="app.js"></script>
</head>

<body>
    <h1 id="title">RV Alumni Meet Registration</h1>
    <p id="description">Please enter registration information for the alumni meet. You may fill one form per group.</p>

    <form name="registrationForm">
        <h4 id="firstFormElement">Person 1</h4>

        <label for="firstName1">First name:</label>
        <input type="text" name="firstName1" required>
        <br>

        <label for="lastName1">Last name:</label>
        <input type="text" name="lastName1" required>
        <br>

        <label for="email1">Primary Email:</label>
        <input type="email" 
            name="email1"
            required>
        <br>

        <label for="emailSec1">Secondary Email (Optional):</label>
        <input type="email"
            name="emailSec1">
        <br>

        <label for="phone1">Phone number (with country code):</label>
        <input type="tel" 
            name="phone1" 
            minlength="11"
            placeholder=""
            required>
        <br>

        <label for="address1">Address:</label>
        <input type="text" 
            name="address1" 
            size="40"
            required>
        <br>

        <p class="formLabel">Gender:</p>
        <input type="radio" id="m1" name="gender1" value="Male" required>
        <label for="m1">Male</label>
        <input type="radio" id="f1" name="gender1" value="Female" required>
        <label for="f1">Female</label>
        <br>

        <p class="formLabel">Class Year:</p>
        <input type="radio" id="icse1" name="class1" value="ICSE" required>
        <label for="icse1">ICSE</label>
        <input type="radio" id="isc1" name="class1" value="ISC" required>
        <label for="isc1">ISC</label>
        <input type="text" 
            name="year1" 
            inputmode="numeric"  
            size="4"
            maxlength="4"
            minlength="4"
            required>
        <br>

        <p class="formLabel">Shirt size:</p>
        <input type="radio" id="small1" name="size1" value="Small" required>
        <label for="small1">Small</label>
        <input type="radio" id="medium1" name="size1" value="Medium" required>
        <label for="medium1">Medium</label>
        <input type="radio" id="large1" name="size1" value="Large" required>
        <label for="large1">Large</label>
        <br>

        <div id="additionalPersonalInfo"></div>

        <label id="addPersonLabel">Add another person:</label>
        <button id="plus">+</button>
        
        <h4>Payment:</h4>
        <input type="radio" id="paypal" name="payment" value="paypal" required>
        <label for="paypal">Paypal</label>
        <input type="radio" id="qr" name="payment" value="QR Code" required>
        <label for="qr">QR Code</label>
        <div id="paymentMethod"></div>
        <br>

        <input id="submitButton" type="submit" value="Submit">
    </form>

    <div>
        <a href="admin.html" id="adminLink">Admin Dashboard</a>
    </div>

</body>

</html>
